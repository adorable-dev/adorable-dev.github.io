<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Révision Brevet — Planning</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;
  --card:#FFFFFF;
  --text:#18160F;
  --muted:#7A7367;
  --border:#E3DDD4;
  --sidebar-w:270px;
 
  --fr:#5244B0;--fr-l:#EEEDFE;--fr-m:#AFA9EC;--fr-d:#3C3489;
  --ma:#1565A8;--ma-l:#E3EFF9;--ma-m:#7DBAE8;--ma-d:#0C447C;
  --hg:#9A560A;--hg-l:#FBF0E0;--hg-m:#E5A84B;--hg-d:#633806;
  --pc:#0A7358;--pc-l:#E0F5EE;--pc-m:#56C4A0;--pc-d:#085041;
  --sv:#428210;--sv-l:#EAF5DC;--sv-m:#8DC449;--sv-d:#27500A;
  --rev:#C04A1A;--rev-l:#FAECE7;--rev-m:#F0997B;--rev-d:#712B13;
 
  --radius:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
 
/* ─── SIDEBAR ─── */
.sidebar{background:var(--card);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.logo{padding:1.25rem 1.1rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.logo h1{font-family:'Lora',serif;font-size:1.05rem;font-weight:600}
.logo p{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
.days-nav{flex:1;overflow-y:auto;padding:0.5rem 0 1rem}
.day-group{margin-bottom:0.25rem}
.day-header-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;padding:0.55rem 1.1rem;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);font-weight:500;transition:color 0.15s;text-align:left}
.day-header-btn:hover{color:var(--text)}
.day-header-btn .day-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background 0.2s}
.day-header-btn.open .day-dot{background:var(--text)}
.day-header-btn .day-label{flex:1}
.day-header-btn .caret{font-size:10px;transition:transform 0.2s;color:var(--border)}
.day-header-btn.open .caret{transform:rotate(90deg);color:var(--muted)}
.day-tasks-list{overflow:hidden;max-height:0;transition:max-height 0.3s ease}
.day-tasks-list.open{max-height:400px}
.task-btn{display:flex;align-items:flex-start;gap:8px;width:100%;text-align:left;background:none;border:none;padding:0.45rem 1.1rem 0.45rem 2rem;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text);cursor:pointer;transition:background 0.12s;line-height:1.4;border-left:2.5px solid transparent}
.task-btn:hover{background:var(--bg)}
.task-btn.active{font-weight:500;background:var(--bg)}
.task-btn .tb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.task-btn.fr{border-left-color:transparent}.task-btn.fr.active{border-left-color:var(--fr);background:var(--fr-l)}
.task-btn.ma{border-left-color:transparent}.task-btn.ma.active{border-left-color:var(--ma);background:var(--ma-l)}
.task-btn.hg{border-left-color:transparent}.task-btn.hg.active{border-left-color:var(--hg);background:var(--hg-l)}
.task-btn.pc{border-left-color:transparent}.task-btn.pc.active{border-left-color:var(--pc);background:var(--pc-l)}
.task-btn.sv{border-left-color:transparent}.task-btn.sv.active{border-left-color:var(--sv);background:var(--sv-l)}
.task-btn.rev{border-left-color:transparent}.task-btn.rev.active{border-left-color:var(--rev);background:var(--rev-l)}
.done-mark{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:9px;border:1.5px solid var(--border);transition:all 0.2s}
.done-mark.checked{background:var(--sv);border-color:var(--sv);color:#fff}
 
/* ─── MAIN ─── */
.main{padding:2rem 2.5rem;overflow-y:auto;max-width:820px}
 
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:1rem}
.welcome-icon{font-size:2.5rem}
.welcome h2{font-family:'Lora',serif;font-size:1.4rem;font-weight:600}
.welcome p{color:var(--muted);max-width:380px;font-size:14px;line-height:1.7}
.welcome .hint{font-size:12px;color:var(--muted);opacity:0.7;border:1px solid var(--border);padding:8px 16px;border-radius:99px}
 
.loading{display:flex;flex-direction:column;align-items:center;gap:1.25rem;padding:5rem 2rem;text-align:center}
.spinner{width:32px;height:32px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--muted);font-size:13.5px}
 
/* breadcrumb */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.breadcrumb span{color:var(--text);font-weight:500}
.breadcrumb .sep{opacity:0.4}
 
/* subj tag */
.subj-tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;padding:3px 11px;border-radius:99px;margin-bottom:0.7rem}
.subj-tag.fr{background:var(--fr-l);color:var(--fr-d)}
.subj-tag.ma{background:var(--ma-l);color:var(--ma-d)}
.subj-tag.hg{background:var(--hg-l);color:var(--hg-d)}
.subj-tag.pc{background:var(--pc-l);color:var(--pc-d)}
.subj-tag.sv{background:var(--sv-l);color:var(--sv-d)}
.subj-tag.rev{background:var(--rev-l);color:var(--rev-d)}
 
.content-title{font-family:'Lora',serif;font-size:1.55rem;font-weight:600;line-height:1.25;margin-bottom:0.6rem}
.duration-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);border:1px solid var(--border);padding:4px 12px;border-radius:99px;margin-bottom:1.25rem}
 
/* key points */
.key-points{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.5rem}
.kp{font-size:12px;padding:4px 11px;border-radius:99px;font-weight:500;border:1px solid}
.kp.fr{background:var(--fr-l);color:var(--fr-d);border-color:var(--fr-m)}
.kp.ma{background:var(--ma-l);color:var(--ma-d);border-color:var(--ma-m)}
.kp.hg{background:var(--hg-l);color:var(--hg-d);border-color:var(--hg-m)}
.kp.pc{background:var(--pc-l);color:var(--pc-d);border-color:var(--pc-m)}
.kp.sv{background:var(--sv-l);color:var(--sv-d);border-color:var(--sv-m)}
.kp.rev{background:var(--rev-l);color:var(--rev-d);border-color:var(--rev-m)}
 
/* section label */
.sec-label{font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
 
/* cours */
.cours-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 1.75rem;margin-bottom:1.75rem;font-family:'Lora',serif;font-size:14.5px;line-height:1.85;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.cours-card h3{font-size:0.95rem;font-weight:600;margin:1rem 0 0.35rem;font-family:'DM Sans',sans-serif;letter-spacing:0.01em}
.cours-card ul,.cours-card ol{padding-left:1.4rem;margin:0.4rem 0}
.cours-card li{margin:0.2rem 0}
.cours-card p{margin:0.35rem 0}
.cours-card strong{font-weight:600}
.cours-card .formula{background:var(--bg);border-left:3px solid var(--border);padding:0.5rem 1rem;border-radius:0 6px 6px 0;font-family:'DM Mono',monospace;font-size:13.5px;margin:0.6rem 0;display:block}
 
/* exercices */
.exo-list{display:flex;flex-direction:column;gap:11px;margin-bottom:1.5rem}
.exo-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.05)}
.exo-header{padding:0.9rem 1.25rem;display:flex;align-items:center;gap:12px}
.exo-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:500;flex-shrink:0}
.exo-num.fr{background:var(--fr-l);color:var(--fr-d)}
.exo-num.ma{background:var(--ma-l);color:var(--ma-d)}
.exo-num.hg{background:var(--hg-l);color:var(--hg-d)}
.exo-num.pc{background:var(--pc-l);color:var(--pc-d)}
.exo-num.sv{background:var(--sv-l);color:var(--sv-d)}
.exo-num.rev{background:var(--rev-l);color:var(--rev-d)}
.exo-meta{flex:1}
.exo-label{font-size:13.5px;font-weight:500}
.niv{font-size:11px;padding:2px 9px;border-radius:99px;display:inline-block;margin-top:3px}
.niv.Facile{background:#EAF5DC;color:#428210}
.niv.Moyen{background:#FBF0E0;color:#9A560A}
.niv.Difficile{background:#FAECE7;color:#993C1D}
.exo-enonce{padding:0 1.25rem 0.8rem;font-size:14px;line-height:1.75;font-family:'Lora',serif;color:var(--text)}
.show-corr-btn{margin:0 1.25rem 1rem;background:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all 0.12s}
.show-corr-btn:hover{background:var(--bg);color:var(--text)}
.correction{display:none;margin:0 1.25rem 1rem;padding:0.9rem 1.1rem;border-radius:8px;font-size:13.5px;line-height:1.75;font-family:'Lora',serif}
.correction.visible{display:block}
.correction.fr{background:var(--fr-l);border-left:3px solid var(--fr)}
.correction.ma{background:var(--ma-l);border-left:3px solid var(--ma)}
.correction.hg{background:var(--hg-l);border-left:3px solid var(--hg)}
.correction.pc{background:var(--pc-l);border-left:3px solid var(--pc)}
.correction.sv{background:var(--sv-l);border-left:3px solid var(--sv)}
.correction.rev{background:var(--rev-l);border-left:3px solid var(--rev)}
.corr-ttl{font-size:10.5px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;opacity:0.65;font-family:'DM Sans',sans-serif;margin-bottom:0.4rem}
 
/* done + regen */
.bottom-row{display:flex;align-items:center;gap:12px;margin-top:0.5rem;margin-bottom:2rem}
.done-btn{display:flex;align-items:center;gap:7px;background:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.done-btn:hover,.done-btn.checked{background:#EAF5DC;border-color:var(--sv);color:var(--sv-d)}
.done-btn .checkmark{width:14px;height:14px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px}
.regen-btn{background:none;border:1px solid var(--border);padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s;margin-left:auto}
.regen-btn:hover{background:var(--card);color:var(--text)}
 
.error{background:#FAECE7;border:1px solid var(--rev-m);border-radius:var(--radius);padding:1rem 1.25rem;color:var(--rev-d);font-size:13.5px}
 
/* progress bar at top of sidebar */
.progress-wrap{padding:0.75rem 1.1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.progress-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.pbar{background:var(--bg);border-radius:99px;height:5px;overflow:hidden}
.pbar-fill{background:var(--sv);height:5px;border-radius:99px;transition:width 0.4s;width:0%}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
  <div class="logo">
    <h1>Révision Brevet</h1>
    <p>Planning semaine 1</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>Progression</span>
      <span id="prog-lbl">0 / 18</span>
    </div>
    <div class="pbar"><div class="pbar-fill" id="pbar"></div></div>
  </div>
  <div class="days-nav" id="days-nav"></div>
</nav>
 
<main class="main" id="main">
  <div class="welcome">
    <div class="welcome-icon">📅</div>
    <h2>Planning de révision</h2>
    <p>Chaque thème du planning génère un cours résumé et 3 exercices corrigés. Coche les thèmes terminés pour suivre ta progression.</p>
    <div class="hint">← Commence par Lundi dans le menu</div>
  </div>
</main>
</div>
 
<script>
const planning = [
  { day:'Lundi', theme:'Maths — algèbre', tasks:[
    { subj:'ma', dur:'30 min', label:'Calculs et fractions', prompt:'Calculs numériques, fractions, puissances et priorités opératoires au brevet' },
    { subj:'ma', dur:'40 min', label:'Équations et inéquations', prompt:'Résolution d\'équations du 1er degré et systèmes d\'équations au brevet des collèges' },
    { subj:'ma', dur:'20 min', label:'Fonctions affines et linéaires', prompt:'Fonctions affines et linéaires : définition, représentation graphique, lecture de tableau de valeurs au brevet' },
  ]},
  { day:'Mardi', theme:'Français — grammaire', tasks:[
    { subj:'fr', dur:'30 min', label:'Classes et fonctions grammaticales', prompt:'Classes grammaticales (natures) et fonctions grammaticales au brevet des collèges : COD, COI, attribut, subordonnées' },
    { subj:'fr', dur:'30 min', label:'Conjugaison et orthographe', prompt:'Conjugaison au brevet : indicatif, subjonctif, accord du participe passé, pièges d\'orthographe courants' },
    { subj:'fr', dur:'30 min', label:'Compréhension de texte', prompt:'Méthode de lecture et compréhension de texte au brevet : repérer les idées, figures de style, registres, point de vue narratif' },
  ]},
  { day:'Mercredi', theme:'Histoire-Géographie', tasks:[
    { subj:'hg', dur:'30 min', label:'Repères chronologiques clés', prompt:'Repères chronologiques essentiels du programme d\'histoire 3e brevet : de 1914 à nos jours, dates et événements incontournables' },
    { subj:'hg', dur:'30 min', label:'Les deux guerres mondiales et la décolonisation', prompt:'Première et Deuxième Guerre mondiale et décolonisation au brevet d\'histoire 3e : causes, déroulement, conséquences' },
    { subj:'hg', dur:'30 min', label:'Mondialisation et géographie', prompt:'La mondialisation, les inégalités de développement et les espaces urbains/ruraux au brevet de géographie 3e' },
  ]},
  { day:'Jeudi', theme:'Physique-Chimie', tasks:[
    { subj:'pc', dur:'30 min', label:'Électricité et loi d\'Ohm', prompt:'Loi d\'Ohm, circuits en série et en dérivation, tension et intensité au brevet de physique-chimie 3e' },
    { subj:'pc', dur:'30 min', label:'Atomes, molécules et réactions chimiques', prompt:'Structure de la matière : atomes, molécules, ions, et équilibrage d\'équations de réactions chimiques au brevet' },
    { subj:'pc', dur:'20 min', label:'Forces et mouvements', prompt:'Forces, mouvements, vitesse et principe d\'inertie au brevet de physique 3e' },
  ]},
  { day:'Vendredi', theme:'SVT', tasks:[
    { subj:'sv', dur:'30 min', label:'ADN, génétique et évolution', prompt:'ADN, gènes, hérédité, mutations et sélection naturelle au brevet de SVT 3e' },
    { subj:'sv', dur:'30 min', label:'Immunité et système nerveux', prompt:'Défenses immunitaires de l\'organisme et fonctionnement du système nerveux au brevet de SVT 3e' },
    { subj:'sv', dur:'20 min', label:'Géologie et environnement', prompt:'Tectonique des plaques, séismes, volcans et enjeux climatiques et environnementaux au brevet de SVT 3e' },
  ]},
  { day:'Samedi', theme:'Maths — géométrie', tasks:[
    { subj:'ma', dur:'30 min', label:'Théorèmes de Pythagore et Thalès', prompt:'Théorème de Pythagore et théorème de Thalès au brevet des collèges : énoncés, démonstrations et applications' },
    { subj:'ma', dur:'20 min', label:'Trigonométrie', prompt:'Trigonométrie dans un triangle rectangle : cosinus, sinus, tangente — définitions et applications au brevet 3e' },
    { subj:'rev', dur:'30 min', label:'Mini-bilan et points faibles', prompt:'Révision générale brevet 3e : exercices variés couvrant les principales erreurs des élèves en maths (algèbre et géométrie)' },
  ]},
  { day:'Dimanche', theme:'Français — expression', tasks:[
    { subj:'fr', dur:'40 min', label:'Rédaction et argumentation', prompt:'La rédaction au brevet : sujet d\'imagination, lettre, texte argumentatif — méthode et exercice d\'entraînement' },
    { subj:'fr', dur:'20 min', label:'Lecture d\'un texte argumentatif', prompt:'Analyser un texte argumentatif au brevet : identifier la thèse, les arguments, les exemples, et les procédés rhétoriques' },
    { subj:'rev', dur:'15 min', label:'Bilan de semaine', prompt:'Bilan de révision pour le brevet : rappel des notions clés vues dans la semaine en français et maths, et conseils méthodologiques pour la semaine suivante' },
  ]},
];
 
const subjNames = {fr:'Français',ma:'Maths',hg:'Histoire-Géo',pc:'Physique-Chimie',sv:'SVT',rev:'Révision'};
const done = new Set();
const totalTasks = planning.reduce((s,d)=>s+d.tasks.length,0);
 
function updateProgress(){
  document.getElementById('prog-lbl').textContent=`${done.size} / ${totalTasks}`;
  document.getElementById('pbar').style.width=`${Math.round(done.size/totalTasks*100)}%`;
}
 
// Build sidebar
const nav = document.getElementById('days-nav');
let activeBtn = null;
 
planning.forEach((dayObj,di)=>{
  const grp = document.createElement('div');
  grp.className='day-group';
 
  const hdr = document.createElement('button');
  hdr.className='day-header-btn';
  hdr.innerHTML=`<span class="day-dot"></span><span class="day-label">${dayObj.day} <span style="font-weight:300;opacity:0.6">— ${dayObj.theme}</span></span><span class="caret">▶</span>`;
 
  const list = document.createElement('div');
  list.className='day-tasks-list';
 
  dayObj.tasks.forEach((t,ti)=>{
    const id=`${di}-${ti}`;
    const btn=document.createElement('button');
    btn.className=`task-btn ${t.subj}`;
    btn.dataset.id=id;
    btn.innerHTML=`<div class="done-mark" id="dm-${id}"></div><span>${t.label}</span>`;
    btn.onclick=()=>loadTask(t,btn,id,dayObj.day);
    list.appendChild(btn);
  });
 
  hdr.onclick=()=>{
    const open=list.classList.toggle('open');
    hdr.classList.toggle('open',open);
  };
 
  grp.appendChild(hdr);
  grp.appendChild(list);
  nav.appendChild(grp);
 
  // auto-open first day
  if(di===0){list.classList.add('open');hdr.classList.add('open');}
});
 
async function loadTask(task, btn, id, dayLabel){
  if(activeBtn) activeBtn.classList.remove('active');
  btn.classList.add('active');
  activeBtn=btn;
 
  const main=document.getElementById('main');
  main.innerHTML=`<div class="loading"><div class="spinner"></div><p>Génération du cours et des exercices…</p></div>`;
 
  const sysPrompt=`Tu es un professeur de collège expert, préparant un élève de 3e au brevet des collèges.
Génère un contenu de révision ciblé, clair et adapté au niveau 3e.
Réponds UNIQUEMENT avec un objet JSON valide, sans balises markdown, sans texte avant ou après.
 
Format exact :
{
  "titre": "titre court et précis",
  "points_cles": ["notion 1", "notion 2", "notion 3", "notion 4"],
  "cours": "HTML (utilise <p>, <strong>, <ul><li>, <h3>, et pour les formules/définitions clés : <div class=\\"formula\\">…</div>). Max 350 mots. En français. Pédagogique et structuré.",
  "exercices": [
    {"niveau":"Facile","enonce":"énoncé complet en français, contextualisé","correction":"correction détaillée étape par étape"},
    {"niveau":"Moyen","enonce":"énoncé complet","correction":"correction détaillée"},
    {"niveau":"Difficile","enonce":"énoncé complet, style brevet","correction":"correction détaillée"}
  ]
}`;
 
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        system:sysPrompt,
        messages:[{role:'user',content:`Thème : ${task.prompt}\nMatière : ${subjNames[task.subj]}\nDurée prévue : ${task.dur}`}]
      })
    });
    const data=await res.json();
    const raw=data.content.map(b=>b.text||'').join('');
    const clean=raw.replace(/```json|```/g,'').trim();
    let d;
    try{d=JSON.parse(clean);}
    catch(e){const m=clean.match(/\{[\s\S]*\}/);if(m)d=JSON.parse(m[0]);else throw new Error('JSON invalide');}
    renderContent(task,d,id,dayLabel);
  }catch(err){
    main.innerHTML=`<div class="error">Erreur lors de la génération. Réessaie dans quelques secondes.<br><small style="opacity:0.7">${err.message}</small></div>`;
  }
}
 
function renderContent(task,d,id,dayLabel){
  const main=document.getElementById('main');
  const isDone=done.has(id);
  const s=task.subj;
 
  let html=`
    <div class="breadcrumb">${dayLabel} <span class="sep">›</span> <span>${subjNames[s]}</span> <span class="sep">›</span> <span>${task.label}</span></div>
    <div class="subj-tag ${s}">${subjNames[s]}</div>
    <h2 class="content-title">${d.titre}</h2>
    <div class="duration-chip">⏱ ${task.dur}</div>
    <div class="key-points">${(d.points_cles||[]).map(p=>`<span class="kp ${s}">${p}</span>`).join('')}</div>
 
    <div class="sec-label">Cours résumé</div>
    <div class="cours-card">${d.cours}</div>
 
    <div class="sec-label">Exercices</div>
    <div class="exo-list">`;
 
  (d.exercices||[]).forEach((ex,i)=>{
    html+=`
      <div class="exo-card">
        <div class="exo-header">
          <div class="exo-num ${s}">${i+1}</div>
          <div class="exo-meta">
            <div class="exo-label">Exercice ${i+1}</div>
            <span class="niv ${ex.niveau}">${ex.niveau}</span>
          </div>
        </div>
        <div class="exo-enonce">${ex.enonce}</div>
        <button class="show-corr-btn" onclick="toggleCorr(this)">Voir la correction</button>
        <div class="correction ${s}">
          <div class="corr-ttl">Correction</div>
          ${ex.correction}
        </div>
      </div>`;
  });
 
  html+=`</div>
    <div class="bottom-row">
      <button class="done-btn${isDone?' checked':''}" id="done-btn-${id}" onclick="toggleDone('${id}')">
        <span class="checkmark">${isDone?'✓':''}</span>
        ${isDone?'Thème terminé ✓':'Marquer comme terminé'}
      </button>
      <button class="regen-btn" onclick="document.querySelector('[data-id=\\'${id}\\']').click()">↻ Nouveaux exercices</button>
    </div>`;
 
  main.innerHTML=html;
  main.scrollTo(0,0);
}
 
function toggleCorr(btn){
  const c=btn.nextElementSibling;
  const show=c.classList.toggle('visible');
  btn.textContent=show?'Masquer la correction':'Voir la correction';
}
 
function toggleDone(id){
  if(done.has(id)){done.delete(id);}else{done.add(id);}
  const btn=document.getElementById(`done-btn-${id}`);
  const dm=document.getElementById(`dm-${id}`);
  const isDone=done.has(id);
  if(btn){btn.className='done-btn'+(isDone?' checked':'');btn.innerHTML=`<span class="checkmark">${isDone?'✓':''}</span>${isDone?'Thème terminé ✓':'Marquer comme terminé'}`;}
  if(dm){dm.className='done-mark'+(isDone?' checked':'');dm.textContent=isDone?'✓':'';}
  updateProgress();
}
</script>
</body>
</html>
